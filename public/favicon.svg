<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="keelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369A1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0F172A"/>

  <!-- Keel shape: hull + keel fin -->
  <!-- Hull (boat bottom arc) -->
  <path d="M6 14 Q16 22 26 14" stroke="url(#keelGrad)" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Keel fin pointing down -->
  <path d="M16 22 L16 27" stroke="url(#keelGrad)" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Waterline / deck -->
  <line x1="6" y1="14" x2="26" y2="14" stroke="#38BDF8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Mast hint -->
  <line x1="16" y1="14" x2="16" y2="7" stroke="#38BDF8" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Sail suggestion -->
  <path d="M16 8 L22 13 L16 13 Z" fill="#38BDF8" opacity="0.35"/>
</svg>